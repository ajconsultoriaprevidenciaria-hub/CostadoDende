{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Senha Redefinida | Costa do Dendê</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #05080f; overflow: hidden; }
    .reset-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    .reset-card {
      width: 100%; max-width: 380px; margin: 0 16px;
      background: rgba(5,12,26,0.82); border: 1px solid rgba(0,217,166,0.22);
      border-radius: 22px; padding: 32px 28px 28px;
      box-shadow: 0 0 0 1px rgba(0,217,166,.06) inset, 0 32px 80px rgba(0,0,0,.7);
      backdrop-filter: blur(20px) saturate(1.4);
      animation: card-in .9s cubic-bezier(.22,1,.36,1) both;
      text-align: center;
    }
    @keyframes card-in { from { opacity:0; transform: translateY(30px) scale(.97); } to { opacity:1; transform: translateY(0) scale(1); } }
    .reset-icon { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #00d9a6, #00896a); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; box-shadow: 0 0 20px rgba(0,217,166,.4); }
    .reset-title { font-size: 1.2rem; font-weight: 800; color: #e8f0fe; margin-bottom: 12px; }
    .reset-msg { font-size: .82rem; color: rgba(255,255,255,.5); line-height: 1.6; margin-bottom: 24px; }
    .reset-login-btn { display: block; width: 100%; padding: 14px; text-align: center; background: linear-gradient(135deg, #00d9a6 0%, #00b289 100%); color: #03100c; font-size: .9rem; font-weight: 800; border: none; border-radius: 11px; text-decoration: none; box-shadow: 0 6px 30px rgba(0,217,166,.35); transition: filter .2s; }
    .reset-login-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
<div class="reset-overlay">
  <div class="reset-card">
    <div class="reset-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <div class="reset-title">Senha Redefinida!</div>
    <div class="reset-msg">Sua senha foi alterada com sucesso. Agora você já pode acessar o sistema com a nova senha.</div>
    <a href="{% url 'login' %}" class="reset-login-btn">Entrar no Sistema &rarr;</a>
  </div>
</div>
</body>
</html>
