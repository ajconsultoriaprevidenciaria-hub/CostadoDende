{% extends "admin/change_form.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
  .form-row { padding: 6px 12px !important; }
  fieldset { margin-bottom: 8px !important; padding: 8px 12px !important; }
  .help, .helptext { display: none !important; }
  .aligned label { padding: 4px 0 !important; }
  fieldset h2 { margin: 0 0 6px !important; font-size: .9rem !important; }
  /* Password row custom */
  .pwd-display {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .pwd-dots {
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text, #e0e0e0);
    font-family: monospace;
    user-select: none;
  }
  .pwd-eye-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted, #888);
    padding: 2px;
    display: inline-flex;
    align-items: center;
  }
  .pwd-eye-btn:hover { color: var(--primary, #00d9a6); }
  .pwd-change-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--primary, #00d9a6);
    font-weight: 600;
    text-decoration: none;
    font-size: .82rem;
    margin-left: 14px;
  }
  .pwd-change-link:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block after_field_sets %}
{{ block.super }}
<script>
(function(){
  var row = document.querySelector('.form-row.field-password');
  if (!row) return;

  // Find the div/td that contains the password content (after the label)
  var container = row.querySelector('div') || row;
  // Remove all existing content except label
  var label = row.querySelector('label');

  // Build new password display
  var wrapper = document.createElement('div');
  wrapper.className = 'pwd-display';
  wrapper.style.marginTop = '4px';

  var dots = document.createElement('span');
  dots.className = 'pwd-dots';
  dots.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
  dots.setAttribute('data-visible', 'false');
  wrapper.appendChild(dots);

  var eyeBtn = document.createElement('button');
  eyeBtn.type = 'button';
  eyeBtn.className = 'pwd-eye-btn';
  eyeBtn.title = 'Senha criptografada - não é possível visualizar';
  eyeBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
  eyeBtn.addEventListener('click', function(){
    if (dots.getAttribute('data-visible') === 'false') {
      dots.textContent = '(criptografada)';
      dots.style.fontSize = '.8rem';
      dots.style.letterSpacing = '0';
      dots.style.color = 'var(--muted, #888)';
      dots.setAttribute('data-visible', 'true');
      eyeBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      dots.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
      dots.style.fontSize = '1.1rem';
      dots.style.letterSpacing = '2px';
      dots.style.color = 'var(--text, #e0e0e0)';
      dots.setAttribute('data-visible', 'false');
      eyeBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  });
  wrapper.appendChild(eyeBtn);

  var changeLink = document.createElement('a');
  changeLink.href = '../password/';
  changeLink.className = 'pwd-change-link';
  changeLink.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Alterar senha';
  wrapper.appendChild(changeLink);

  // Replace password row content
  if (label && label.parentNode) {
    // Remove everything after label
    while (label.nextSibling) {
      label.parentNode.removeChild(label.nextSibling);
    }
    label.parentNode.appendChild(wrapper);
  }
})();
</script>
{% endblock %}
