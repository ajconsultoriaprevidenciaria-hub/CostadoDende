{% extends "motorista_portal/base.html" %}

{% block topbar %}
<div class="mp-topbar">
    <div>
        <div class="brand-name">COSTA DO DENDÊ</div>
        <div class="brand-sub">Portal do Motorista</div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="mp-card" style="margin-top:40px;">
    <h2 style="text-align:center;">Acesso do Motorista</h2>
    <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="mp-field">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" inputmode="numeric" required autofocus>
        </div>
        <div class="mp-field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="mp-btn mp-btn-primary mp-btn-block" style="margin-top:6px;">Entrar</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('cpf').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    e.target.value = v;
});
</script>
{% endblock %}
