services:
  postgres:
    image: postgres:16
    container_name: costadodende_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-costadodende}
      POSTGRES_USER: ${DB_USER:-costadodende}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-costadodende}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-costadodende}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: costadodende_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
