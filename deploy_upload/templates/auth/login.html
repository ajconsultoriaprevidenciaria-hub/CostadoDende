{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar | Costa do Dendê</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

    body {
      background: url("{% static 'img/igreja_amparo.png' %}") center center / cover no-repeat fixed;
      background-color: #1a3a5c;
    }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg,
        rgba(20,60,120,0.35) 0%,
        rgba(10,40,80,0.25) 40%,
        rgba(5,20,50,0.50) 100%
      );
      backdrop-filter: blur(1.5px);
    }

    .login-overlay {
      position: fixed; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .login-card {
      pointer-events: all;
      width: 100%; max-width: 380px; margin: 0 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 22px;
      padding: 32px 28px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 0 0 1px rgba(255,255,255,.2) inset;
      backdrop-filter: blur(24px) saturate(1.6);
      animation: card-in .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes card-in {
      from { opacity:0; transform: translateY(30px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .card-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 22px; }
    .card-logo img { height: 100px; width: auto; }

    .card-title {
      font-size: 1.3rem; font-weight: 800; color: #1a3a5c;
      text-align: center; margin-bottom: 4px;
    }
    .card-sub {
      font-size: .78rem; color: rgba(30,60,100,.55);
      text-align: center; margin-bottom: 24px;
    }

    .login-field { margin-bottom: 16px; }
    .login-field label {
      display: block; font-size: .65rem; font-weight: 700;
      color: rgba(30,60,100,.55); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 7px;
    }
    .login-field input {
      width: 100%; background: rgba(255,255,255,.6);
      border: 1px solid rgba(30,60,100,.15); color: #1a2a40;
      border-radius: 11px; padding: 13px 15px; font-size: .88rem;
      font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .login-field input:focus {
      border-color: #2a6db5; background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 3px rgba(42,109,181,.18);
    }
    .login-field input::placeholder { color: rgba(30,60,100,.3); }

    .login-btn {
      width: 100%; padding: 14px; margin-top: 6px;
      background: linear-gradient(135deg, #1e5fa8 0%, #1a4d8c 100%);
      color: #fff; font-size: .9rem; font-weight: 800;
      border: none; border-radius: 11px; cursor: pointer; letter-spacing: .3px;
      box-shadow: 0 6px 24px rgba(30,95,168,.35);
      transition: filter .2s, transform .12s;
    }
    .login-btn:hover  { filter: brightness(1.1); }
    .login-btn:active { transform: scale(.98); }

    .login-msg-error {
      background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); color: #b91c1c;
      border-radius: 10px; padding: 11px 14px; font-size: .78rem; margin-bottom: 18px; text-align: center;
    }

    .forgot-link {
      display: block; text-align: center; margin-top: 14px;
      font-size: .78rem; color: rgba(30,60,100,.5);
      text-decoration: none; transition: color .2s;
    }
    .forgot-link:hover { color: #1e5fa8; }

    .back-link {
      display: block; text-align: center; margin-top: 10px; padding-top: 16px;
      border-top: 1px solid rgba(30,60,100,.12);
      font-size: .78rem; color: rgba(30,60,100,.45);
      text-decoration: none; transition: color .2s;
    }
    .back-link:hover { color: #1e5fa8; }
    .back-link::before { content: '← '; }

    .location-label {
      position: fixed; bottom: 14px; left: 0; right: 0; z-index: 2;
      text-align: center; pointer-events: none;
      font-size: .62rem; color: rgba(255,255,255,.65);
      letter-spacing: 1.5px; text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="login-overlay">
    <div class="login-card">
      <div class="card-logo">
        <img src="{% static 'img/logo.png' %}" alt="Costa do Dendê">
      </div>

      {% if form.errors %}
        <div class="login-msg-error">Usuário ou senha inválidos. Tente novamente.</div>
      {% endif %}

      <div class="card-title">Acesso ao Sistema</div>
      <div class="card-sub">Valen&ccedil;a &mdash; Bahia</div>

      <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="login-field">
          <label for="id_username">Usuário</label>
          <input type="text" name="username" id="id_username" placeholder="Digite seu usuário" required autofocus>
        </div>
        <div class="login-field">
          <label for="id_password">Senha</label>
          <input type="password" name="password" id="id_password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
        </div>
        <button type="submit" class="login-btn">Entrar no Sistema &rarr;</button>
      </form>
      <a href="{% url 'password_reset' %}" class="forgot-link">Esqueceu a senha?</a>
      <a href="/" class="back-link">Voltar para o site</a>
    </div>
  </div>

  <div class="location-label">Igreja N. Sra. do Amparo &middot; Valen&ccedil;a &middot; Bahia</div>

</body>
</html>
